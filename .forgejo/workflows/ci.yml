name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: docker
    timeout-minutes: 30
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Set up Go 1.25
        uses: https://data.forgejo.org/actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Race tests and coverage
        run: go test -race -shuffle=on -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: Repeated concurrency tests
        run: go test -race -count=20 ./internal/appserver ./internal/appserverproxy ./internal/broker ./internal/brokerclient ./internal/codex
      - name: Fuzz protocol boundaries
        run: |
          go test -run=^$ -fuzz=FuzzConnRead -fuzztime=5s ./internal/wire
          go test -run=^$ -fuzz=FuzzRequestIDJSON -fuzztime=5s ./internal/appserver
          go test -run=^$ -fuzz=FuzzParseUnixEndpoint -fuzztime=5s ./internal/appserver
          go test -run=^$ -fuzz=FuzzDecodeSendMessage -fuzztime=5s ./internal/intercomtools
          go test -run=^$ -fuzz=FuzzDecodeListPeers -fuzztime=5s ./internal/intercomtools
      - name: Upload coverage
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: docker
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Set up Go 1.25
        uses: https://data.forgejo.org/actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build ./cmd/intercom

  nix:
    runs-on: docker
    timeout-minutes: 30
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
      - name: Check flake
        run: nix flake check --print-build-logs
